version: '3.9'

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fusion_agent_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fusion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fusionpassword}
      POSTGRES_DB: ${POSTGRES_DB:-fusionagent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../backend/app/infrastructure/database/migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fusion} -d ${POSTGRES_DB:-fusionagent}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fusion_agent_redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ChromaDB ───────────────────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:0.5.15
    container_name: fusion_agent_chromadb
    environment:
      CHROMA_SERVER_AUTH_CREDENTIALS_PROVIDER: ""
      ANONYMIZED_TELEMETRY: "false"
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: fusion_agent_backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-fusion}:${POSTGRES_PASSWORD:-fusionpassword}@postgres:5432/${POSTGRES_DB:-fusionagent}
      - REDIS_URL=redis://redis:6379/0
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production-min-32-chars!!}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-change-me-internal-key}
      - ORACLE_FUSION_BASE_URL=${ORACLE_FUSION_BASE_URL}
      - ORACLE_FUSION_USERNAME=${ORACLE_FUSION_USERNAME}
      - ORACLE_FUSION_PASSWORD=${ORACLE_FUSION_PASSWORD}
      - ORACLE_FUSION_MFA_ENABLED=${ORACLE_FUSION_MFA_ENABLED:-false}
      - PLAYWRIGHT_HEADLESS=true
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CORS_ORIGINS=["http://localhost:3000","http://frontend:3000"]
    volumes:
      - screenshots_data:/tmp/screenshots
      - traces_data:/tmp/traces
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ── Frontend (Next.js) ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: fusion_agent_frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # ── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: fusion_agent_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  screenshots_data:
  traces_data:
