apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fusion-agent-ingress
  namespace: oracle-fusion-agent
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  rules:
  - host: fusion-agent.yourdomain.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: fusion-agent-backend-service
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: fusion-agent-frontend-service
            port:
              number: 3000
